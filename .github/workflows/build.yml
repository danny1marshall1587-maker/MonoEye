name: Build MonoEye

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    name: Windows x64 (MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Vulkan SDK
        run: choco install vulkan-sdk --no-progress -y

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DMONOEYE_STRICT_WARNINGS=ON

      - name: Build Layer
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel

      - name: Build Switcher
        run: dotnet publish switcher/MonoEyeSwitcher.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ${{github.workspace}}/switcher-output

      - name: Package Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          Copy-Item build\XR_APILAYER_NOVENDOR_monoeye.dll release\
          Copy-Item manifest\XR_APILAYER_NOVENDOR_monoeye.json release\
          Copy-Item README.md release\
          Copy-Item LICENSE release\
          Copy-Item switcher-output\MonoEyeSwitcher.exe release\
          Copy-Item install\windows\install.bat release\
          Copy-Item install\windows\uninstall.bat release\
          Compress-Archive -Path release\* -DestinationPath MonoEye-windows-x64.zip

      - name: Upload Windows Artifact
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: monoeye-windows-x64
          path: MonoEye-windows-x64.zip

      - name: Upload to Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MonoEye-windows-x64.zip

  build-linux:
    name: Linux x64 (GCC)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            python3 \
            libvulkan-dev \
            glslang-tools \
            vulkan-validationlayers

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DMONOEYE_STRICT_WARNINGS=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel

      - name: Package Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp build/libXR_APILAYER_NOVENDOR_monoeye.so release/XR_APILAYER_NOVENDOR_monoeye.so
          cp manifest/XR_APILAYER_NOVENDOR_monoeye.json release/
          cp README.md release/
          cp LICENSE release/
          cd release && zip -r ../MonoEye-linux-x64.zip *

      - name: Upload Linux Artifact
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: monoeye-linux-x64
          path: MonoEye-linux-x64.zip

      - name: Upload to Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MonoEye-linux-x64.zip
